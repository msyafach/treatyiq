services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: treatyiq
      POSTGRES_USER: treatyiq
      POSTGRES_PASSWORD: treatyiq_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U treatyiq"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.example
    environment:
      - DEBUG=True
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/api/auth/login/ > /dev/null 2>&1 || exit 0"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py create_test_data &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  media_data:
